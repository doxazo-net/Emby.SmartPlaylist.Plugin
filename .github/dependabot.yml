version: 2
updates:
  # This repo is a fork; scaffolding is deliberately limited to dependency
  # updates so it stays close to upstream. No CI or CodeQL workflows are added
  # here - build/release automation is upstream's concern.
  - package-ecosystem: nuget
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - nuget
    groups:
      nuget-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "ci"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    groups:
      actions-all:
        patterns:
          - "*"
